<!DOCTYPE html>
<html>
<head>
<title>რეცეპტების საიტი</title>
</head>

<body>

<!-- ul ნიშნავს Unordered List-ს ანუ არანომრირებულ სიას (პუნქტებით •) -->
<!-- li ნიშნავს List Item-ს ანუ სიაში ერთ ელემენტს -->

<h2>ინგრედიენტები</h2>
<ul>
<li>ფქვილი</li>
<li>წყალი</li>
<li>ყველი</li>
</ul>

<!-- ol ნიშნავს Ordered List-ს ანუ დანომრილ სიას (1,2,3) -->
<!-- li აქაც ნიშნავს სიაში ერთ ელემენტს -->

<h2>მომზადების ნაბიჯები</h2>
<ol>
<li>გავაკეთოთ ცომი</li>
<li>დავამატოთ სოუსი</li>
<li>დავაყაროთ ყველი</li>
</ol>

<!-- ეს არის სურათი რეცეპტიდან -->
<!-- width ნიშნავს სიგანეს -->
<!-- height ნიშნავს სიმაღლეს -->

<img src="pizza.jpg" width="300" height="200">

<!-- Optional ატრიბუტი ნიშნავს რომ მისი გამოყენება აუცილებელი არ არის -->
<!-- მაგალითად width და height შეიძლება დავწეროთ ან არა -->

<!-- Required ატრიბუტი ნიშნავს რომ აუცილებელია -->
<!-- მაგალითად img ტეგში src აუცილებელია რადგან სურათის მისამართს აჩვენებს -->

</body>
</html>
